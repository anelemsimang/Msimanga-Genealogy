# Next.js app is in /lineage.
# publish must differ from base — UI often defaults publish to the base folder,
# which makes @netlify/plugin-nextjs fail.
[build]
  base = "lineage"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
