# Next.js app is in /lineage.
# Explicit Next.js runtime — auto-detection was deploying .next as static
# files with 0 serverless functions (site 404).
[build]
  base = "lineage"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
